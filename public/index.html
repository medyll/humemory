<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>humemory — Palais de Mémoire</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1><span class="logo">🧠</span> Palais de Mémoire</h1>
      <div style="display: flex; gap: 0.75rem;">
        <a href="/session" style="text-decoration: none;">
          <button class="secondary" style="padding: 0.75rem 1.5rem; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
            🧠 Session Mnésique
          </button>
        </a>
        <button class="primary" onclick="showAddModal()">+ Nouvelle trace</button>
      </div>
    </header>

    <nav class="tab-nav">
      <button class="tab active" data-tab="dashboard">📊 Dashboard</button>
      <button class="tab" data-tab="river">🌊 River</button>
      <button class="tab" data-tab="galaxy">🌌 Galaxy</button>
      <button class="tab" data-tab="replay">🔄 Replay</button>
      <button class="tab" data-tab="promenade">🚶 Promenade</button>
    </nav>

    <main class="tab-content">
      <section id="tab-dashboard" class="tab-pane active">
        <div class="temporal-zones" id="temporalZones">
          <div class="zone-card zone-encoding" onclick="filterByZone('encoding')">
            <h3>Encodage récent</h3>
            <div class="count" id="countEncoding">0</div>
            <div class="description">Formé aujourd'hui</div>
          </div>
          <div class="zone-card zone-consolidating" onclick="filterByZone('consolidating')">
            <h3>En consolidation</h3>
            <div class="count" id="countConsolidating">0</div>
            <div class="description">Cette semaine</div>
          </div>
          <div class="zone-card zone-consolidated" onclick="filterByZone('consolidated')">
            <h3>Consolidé</h3>
            <div class="count" id="countConsolidated">0</div>
            <div class="description">Ce mois</div>
          </div>
          <div class="zone-card zone-fragile" onclick="filterByZone('fragile')">
            <h3>Fragile</h3>
            <div class="count" id="countFragile">0</div>
            <div class="description">Risque d'oubli</div>
          </div>
          <div class="zone-card zone-dormant" onclick="filterByZone('dormant')">
            <h3>En sommeil</h3>
            <div class="count" id="countDormant">0</div>
            <div class="description">Mémoire lointaine</div>
          </div>
        </div>

        <div class="filters">
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="Recherche par indice de récupération..." oninput="debouncedSearch()">
          </div>
          <select id="typeFilter" onchange="loadMemories()">
            <option value="">Tous les types</option>
            <option value="episodic">📅 Episodique</option>
            <option value="semantic">📖 Sémantique</option>
            <option value="procedural">⚡ Procédurale</option>
          </select>
          <select id="contextFilter" onchange="loadMemories()">
            <option value="">Tous les contextes</option>
          </select>
          <select id="sortBy" onchange="loadMemories()">
            <option value="encodage">Date d'encodage</option>
            <option value="force">Force mnésique</option>
            <option value="reactivations">Réactivations</option>
          </select>
          <button onclick="toggleAdvancedFilters()" id="btnAdvanced" title="Filtres avancés" style="padding: 0.75rem; font-size: 1rem; background: var(--surface); border: 1px solid var(--border);">⚙️</button>
        </div>
        <div class="filters-advanced" id="advancedFilters">
          <div class="filter-group">
            <label>De</label>
            <input type="date" id="filterFrom" onchange="loadMemories()">
          </div>
          <div class="filter-group">
            <label>À</label>
            <input type="date" id="filterTo" onchange="loadMemories()">
          </div>
          <div class="filter-group">
            <label>Force min</label>
            <input type="number" id="filterMinSaillance" min="0" max="100" placeholder="0" onchange="loadMemories()">
          </div>
          <div class="filter-group">
            <label>Réactivations min</label>
            <input type="number" id="filterMinRecalls" min="0" placeholder="0" onchange="loadMemories()">
          </div>
          <div class="filter-group">
            <label>
              <input type="checkbox" id="filterPhotographic" onchange="loadMemories()" style="margin-right: 0.3rem;">
              🔒 Photographique seulement
            </label>
          </div>
          <button onclick="clearAdvancedFilters()" style="font-size: 0.8rem; padding: 0.4rem 0.75rem; background: var(--surface-2);">Réinitialiser</button>
        </div>

        <div id="memoryContainer">
          <div class="loading">Chargement des traces mnésiques...</div>
        </div>
      </section>

      <section id="tab-river" class="tab-pane">
        <div class="river-container" id="riverCanvas"></div>
      </section>

      <section id="tab-galaxy" class="tab-pane">
        <div class="galaxy-container" id="galaxyCanvas"></div>
      </section>

      <section id="tab-replay" class="tab-pane">
        <div id="replayContainer"></div>
      </section>

      <section id="tab-promenade" class="tab-pane">
        <div class="promenade-container" id="promenadeCanvas"></div>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Trace mnésique</h2>
        <button class="modal-close" onclick="closeModal('detailModal')">&times;</button>
      </div>
      <div class="modal-body" id="modalContent"></div>
    </div>
  </div>

  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Nouvelle trace mnésique</h2>
        <button class="modal-close" onclick="closeModal('addModal')">&times;</button>
      </div>
      <div class="modal-body">
        <form onsubmit="addMemory(event)" style="display: flex; flex-direction: column; gap: 1rem;">
          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Contenu de la mémoire</label>
            <textarea id="addContent" required rows="4" style="width: 100%; padding: 0.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.95rem;" placeholder="Qu'avez-vous appris ou expérimenté ?"></textarea>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div>
              <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Lieu mental (projet)</label>
              <input type="text" id="addDirectory" value="/mnt/d/development" style="width: 100%; padding: 0.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text);">
            </div>
            <div>
              <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Contexte d'encodage</label>
              <input type="text" id="addSession" value="session-courante" style="width: 100%; padding: 0.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text);">
            </div>
          </div>
          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Indices de récupération (séparés par virgules)</label>
            <input type="text" id="addKeywords" placeholder="concept1, concept2, contexte" style="width: 100%; padding: 0.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text);">
          </div>
          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Résumé pour recherche rapide</label>
            <input type="text" id="addLevel3" placeholder="Mots-clés essentiels pour la récupération" style="width: 100%; padding: 0.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text);">
          </div>
          <div>
            <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Type de mémoire</label>
            <select id="addMemoryType" style="width: 100%; padding: 0.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text);">
              <option value="semantic">📖 Sémantique (fait, concept)</option>
              <option value="episodic">📅 Episodique (événement, contexte)</option>
              <option value="procedural">⚡ Procédurale (geste, routine)</option>
            </select>
          </div>
          <button type="submit" class="primary" style="margin-top: 0.5rem;">Encoder la mémoire</button>
        </form>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/decay.js"></script>
  <script src="/js/decay-curve.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/river.js"></script>
  <script src="/js/galaxy.js"></script>
  <script src="/js/replay.js"></script>
  <script src="/js/promenade.js"></script>
  <script>
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const tabName = tab.dataset.tab;

        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
        document.getElementById(`tab-${tabName}`).classList.add('active');

        if (tabName === 'river') {
          setTimeout(() => initRiver(), 100);
        } else if (tabName === 'galaxy') {
          setTimeout(() => initGalaxy(), 100);
        } else if (tabName === 'replay') {
          setTimeout(() => initReplay(), 100);
        } else if (tabName === 'promenade') {
          setTimeout(() => initPromenade(), 100);
        }
      });
    });
  </script>
</body>
</html>
